name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: SSH into AWS EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/namba-app
            cd ~/namba-app
            
            # Since this is a fresh EC2 without the repo yet, we might need to git clone first
            # But normally CI/CD pulls code. Let's make sure git is setup on the server
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi
            
            # Go to backend folder
            cd namba_backend
            
            # Install dependencies
            npm install
            
            # Restart PM2 server
            pm2 restart server || pm2 start server.js --name "server"
