name: namaba_customer
description: Namaba Delivery - Customer App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  geolocator: ^13.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  url_launcher: ^6.3.1
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  iconsax_flutter: ^1.0.1
  flutter_animate: ^4.5.2
  http: ^1.6.0
  socket_io_client: ^3.1.4
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  shared_preferences: ^2.5.2
  flutter_dotenv: ^5.1.0
  app_settings: ^8.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dependency_overrides:
  latlong2:
    path: packages/latlong2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
